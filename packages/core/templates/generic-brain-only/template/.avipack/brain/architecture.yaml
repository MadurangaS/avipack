architecture:
  components:
    - id: ARCH-001
      name: "Avipack Brain"
      type: folder
      description: "Versioned project memory for requirements, architecture, testing strategy, security rules, glossary, ADRs, and change requests."
      responsibilities:
        - "Store project intent and governance data"
        - "Keep requirements traceable to architecture, tests, changes, and decisions"
      related_requirements:
        - REQ-001
        - REQ-002

    - id: ARCH-002
      name: "Owner-Controlled Bot Layer"
      type: plugin-boundary
      description: "Optional bot packages that remain manual, permission-scoped, and disabled from autonomous execution."
      responsibilities:
        - "Record installed and enabled bot state in project configuration"
        - "Run bot workflows only through explicit commands"
        - "Write audit reports instead of hidden source changes"
      related_requirements:
        - REQ-003
