unit_tests:
  goal: Validate small units of project logic.
  planned_checks:
    - TEST-001: Brain creation utilities produce required files.

integration_tests:
  goal: Validate behavior across package and CLI boundaries.
  planned_checks:
    - TEST-002: CLI commands can read config and brain files.

cli_tests:
  goal: Validate command output and exit behavior.
  planned_checks:
    - TEST-003: Bot commands are manual and do not modify files without explicit execution.

brain_validation_tests:
  goal: Validate project brain consistency.
  planned_checks:
    - Required brain files exist.
    - Requirement IDs are unique.
    - Requirement traces point to known architecture, test, and change IDs.
